name: Forward issue to private repo

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  forward:
    name: Forward application issue
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: westlake-noter
          repositories: |
            membership-application
            private-membership-applications

      - name: Create private issue copy
        id: forward
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: westlake-noter/private-membership-applications
          SOURCE_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_AUTHOR_URL: ${{ github.event.issue.user.html_url }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
        run: |
          body_file="$(mktemp)"
          {
            printf 'Source issue: %s#%s\n' "$SOURCE_REPO" "$ISSUE_NUMBER"
            printf 'Original URL: %s\n' "$ISSUE_URL"
            printf 'Applicant: @%s (%s)\n' "$ISSUE_AUTHOR" "$ISSUE_AUTHOR_URL"
            printf 'Created at: %s\n\n' "$ISSUE_CREATED_AT"
            printf '%s\n\n' '---'
            printf '%s\n' "$ISSUE_BODY"
          } > "$body_file"

          private_issue_url="$(gh issue create \
            --repo "$TARGET_REPO" \
            --title "[Application #$ISSUE_NUMBER] $ISSUE_TITLE" \
            --body-file "$body_file")"

          echo "private_issue_url=$private_issue_url" >> "$GITHUB_OUTPUT"

      - name: Close original issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRIVATE_ISSUE_URL: ${{ steps.forward.outputs.private_issue_url }}
        run: |
          gh issue close "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --comment "Application forwarded to the private review queue: $PRIVATE_ISSUE_URL"
